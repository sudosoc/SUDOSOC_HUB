<!-- ═══ TOOLS LAYOUT ═══ -->
<div class="tools-page">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar" aria-label="Tool categories">
    <div class="sidebar-header">
      <div class="sidebar-search">
        <svg class="sidebar-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="search"
          class="sidebar-search-input"
          id="sidebarSearch"
          placeholder="Filter tools..."
          autocomplete="off"
          aria-label="Filter tools"
        >
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebarNav" aria-label="Tool list">
      <!-- Dynamically rendered by app.js -->
    </nav>
  </aside>

  <!-- Mobile sidebar toggle -->
  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar" aria-expanded="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
      <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <!-- Workspace -->
  <main class="workspace" id="workspace" role="main">
    <div class="workspace-inner">
      <div class="workspace-empty" id="workspaceEmpty">
        <div class="workspace-empty-icon" aria-hidden="true">&gt;_</div>
        <div class="workspace-empty-title">Select a tool to get started</div>
        <p class="workspace-empty-desc">Choose a tool from the sidebar or use the search to find what you need.</p>
      </div>
      <div id="toolContainer" style="display:none"></div>
    </div>
  </main>

</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer" aria-live="polite" aria-label="Notifications"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" id="modalClose" aria-label="Close modal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>
